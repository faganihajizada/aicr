name: 'Setup Build Tools'
description: 'Install container build and release tools (ko, syft, crane, goreleaser)'

inputs:
  install_ko:
    description: 'Install ko (true/false)'
    required: false
    default: 'false'
  ko_version:
    description: 'ko version (e.g. v0.18.0)'
    required: false
    default: 'v0.18.0'
  install_syft:
    description: 'Install syft (true/false)'
    required: false
    default: 'false'
  install_crane:
    description: 'Install crane (true/false)'
    required: false
    default: 'false'
  crane_version:
    description: 'crane version (e.g. v0.20.6)'
    required: false
    default: 'v0.20.6'
  install_goreleaser:
    description: 'Install goreleaser (true/false)'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Install ko
      if: inputs.install_ko == 'true'
      shell: bash
      run: |
        set -euo pipefail
        # Install ko from binary release (go install puts in GOPATH which isn't in PATH)
        # Strip 'v' prefix for URL construction
        KO_VERSION="${{ inputs.ko_version }}"
        KO_VERSION="${KO_VERSION#v}"
        KO_BASE="https://github.com/ko-build/ko/releases/download/v${KO_VERSION}"
        KO_TAR="ko_${KO_VERSION}_Linux_x86_64.tar.gz"
        KO_TMP="$(mktemp -d)"
        curl -fsSL -o "${KO_TMP}/${KO_TAR}" "${KO_BASE}/${KO_TAR}"
        curl -fsSL -o "${KO_TMP}/checksums.txt" "${KO_BASE}/checksums.txt"
        EXPECTED=$(grep "${KO_TAR}" "${KO_TMP}/checksums.txt" | head -1 | awk '{print $1}')
        ACTUAL=$(sha256sum "${KO_TMP}/${KO_TAR}" | awk '{print $1}')
        if [[ "${ACTUAL}" != "${EXPECTED}" ]]; then
          echo "::error::ko checksum mismatch: expected ${EXPECTED}, got ${ACTUAL}"
          exit 1
        fi
        tar -xzf "${KO_TMP}/${KO_TAR}" -C "${KO_TMP}"
        sudo mv "$KO_TMP/ko" /usr/local/bin/ko
        sudo chmod +x /usr/local/bin/ko
        rm -rf "$KO_TMP"
        echo "ko installed: $(ko version)"

    - name: Install Syft
      if: inputs.install_syft == 'true'
      uses: anchore/sbom-action/download-syft@62ad5284b8ced813296287a0b63906cb364b73ee  # v0.22.0

    - name: Install crane
      if: inputs.install_crane == 'true'
      shell: bash
      run: |
        set -euo pipefail
        # Install crane from binary release (go install puts in GOPATH which isn't in PATH)
        # Strip 'v' prefix for URL construction
        CRANE_VERSION="${{ inputs.crane_version }}"
        CRANE_VERSION="${CRANE_VERSION#v}"
        CRANE_BASE="https://github.com/google/go-containerregistry/releases/download/v${CRANE_VERSION}"
        CRANE_TAR="go-containerregistry_Linux_x86_64.tar.gz"
        CRANE_TMP="$(mktemp -d)"
        curl -fsSL -o "${CRANE_TMP}/${CRANE_TAR}" "${CRANE_BASE}/${CRANE_TAR}"
        curl -fsSL -o "${CRANE_TMP}/checksums.txt" "${CRANE_BASE}/checksums.txt"
        EXPECTED=$(grep "${CRANE_TAR}" "${CRANE_TMP}/checksums.txt" | head -1 | awk '{print $1}')
        ACTUAL=$(sha256sum "${CRANE_TMP}/${CRANE_TAR}" | awk '{print $1}')
        if [[ "${ACTUAL}" != "${EXPECTED}" ]]; then
          echo "::error::crane checksum mismatch: expected ${EXPECTED}, got ${ACTUAL}"
          exit 1
        fi
        tar -xzf "${CRANE_TMP}/${CRANE_TAR}" -C "${CRANE_TMP}"
        sudo mv "$CRANE_TMP/crane" /usr/local/bin/crane
        sudo chmod +x /usr/local/bin/crane
        rm -rf "$CRANE_TMP"
        echo "crane installed: $(crane version 2>&1 || echo '${{ inputs.crane_version }}')"

    - name: Install GoReleaser
      if: inputs.install_goreleaser == 'true'
      uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a  # v6.4.0
      with:
        install-only: true
