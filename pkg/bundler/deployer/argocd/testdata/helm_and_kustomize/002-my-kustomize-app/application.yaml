apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-kustomize-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: 'https://github.com/example/aicr-bundles.git'
    targetRevision: main
    path: 002-my-kustomize-app
  destination:
    server: https://kubernetes.default.svc
    namespace: my-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # ServerSideApply: required for charts whose CRDs exceed kubectl's
      # 262144-byte client-side annotation cap (e.g., kube-prometheus-stack,
      # kai-scheduler). Without this, Argo's sync retries forever with
      # "metadata.annotations: Too long". server-side apply uses the
      # apiserver's structured-merge path and has no such cap.
      - ServerSideApply=true
