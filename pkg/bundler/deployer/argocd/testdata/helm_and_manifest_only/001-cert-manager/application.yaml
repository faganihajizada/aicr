apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - repoURL: https://charts.jetstack.io
      chart: cert-manager
      targetRevision: 1.20.2
      helm:
        valueFiles:
          - $values/001-cert-manager/values.yaml
    - repoURL: 'https://github.com/example/aicr-bundles.git'
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # ServerSideApply: required for charts whose CRDs exceed kubectl's
      # 262144-byte client-side annotation cap (e.g., kube-prometheus-stack,
      # kai-scheduler). Without this, Argo's sync retries forever with
      # "metadata.annotations: Too long". server-side apply uses the
      # apiserver's structured-merge path and has no such cap.
      - ServerSideApply=true
