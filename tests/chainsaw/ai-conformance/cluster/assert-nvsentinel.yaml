# Assert NVSentinel controller and platform connector are healthy.
# fullnameOverride: nvsentinel (from values.yaml)
# Chart: nvidia/nvsentinel v0.8.0

# NVSentinel controller — manages network policies and platform configuration
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvsentinel
  namespace: nvsentinel
status:
  conditions:
    - type: Available
      status: "True"
---
# NVSentinel platform connector — DaemonSet on GPU nodes for platform telemetry
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvsentinel-platform-connector
  namespace: nvsentinel
status:
  (numberReady > `0`): true
  (desiredNumberScheduled > `0`): true
